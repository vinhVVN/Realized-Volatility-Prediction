# Cấu hình cho LightGBM
num_models: 5
early_stopping_rounds: 100
num_boost_round: 1500

params:
  objective: "rmse"
  boosting_type: "gbdt"
  max_depth: -1
  max_bin: 100
  min_data_in_leaf: 500
  learning_rate: 0.02
  subsample: 0.72
  subsample_freq: 4
  feature_fraction: 0.5
  lambda_l1: 0.5
  lambda_l2: 1.0
  min_gain_to_split: 0.01
  verbose: -1
  seed: 42
  n_jobs: -1
